<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員登録 - デマス</title>
    <link rel="stylesheet" href="/css/register.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body>
<!-- Header -->
<header class="header">
    <div class="logo" onclick="location.href='/'" style="cursor: pointer;">
        <div class="logo-icon">D</div>
        デマス
    </div>
    <div class="header-buttons">
        <a href="/login" class="login-btn">ログイン</a>
        <a href="/register" class="signup-btn">会員登録</a>
    </div>
</header>

<!-- Main Content -->
<main class="main-content">
    <div class="signup-card">
        <div class="card-icon">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
        <h1 class="card-title">会員登録</h1>
        <p class="card-subtitle">アカウントを作成して、サービスを始めましょう</p>

        <form>
            <div class="form-row">
                <div class="form-group">
                    <label>ユーザーID <span class="required">*</span></label>
                    <input type="text" placeholder="ユーザーIDを入力">
                    <div class="hint-text">重複確認</div>
                </div>
                <div class="form-group">
                    <label>ニックネーム <span class="required">*</span></label>
                    <input type="text" placeholder="ニックネームを入力">
                    <div class="hint-text">重複確認</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>パスワード <span class="required">*</span></label>
                    <input type="password" placeholder="8文字以上">
                </div>
                <div class="form-group">
                    <label>パスワード確認 <span class="required">*</span></label>
                    <input type="password" placeholder="パスワードを再入力">
                </div>
            </div>

            <div class="form-group">
                <label>メールアドレス <span class="required">*</span></label>
                <input type="email" placeholder="example@email.com">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>電話番号</label>
                    <input type="tel" placeholder="080-1234-5678">
                </div>
                <div class="form-group">
                    <label>性別</label>
                    <select>
                        <option>選択してください</option>
                        <option>男性</option>
                        <option>女性</option>
                        <option>その他</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>生年月日</label>
                <input type="date" placeholder="-/-/-">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="agree">
                <label for="agree">LINE通知デチャットボットの利用に同意します</label>
            </div>

            <button type="submit" class="submit-btn">会員登録</button>

            <div class="divider">または</div>

            <button type="button" class="google-btn">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                    <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                    <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707 0-.593.102-1.17.282-1.709V4.958H.957C.347 6.173 0 7.548 0 9c0 1.452.348 2.827.957 4.042l3.007-2.335z"/>
                    <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                Googleで登録
            </button>

            <div class="login-link">
                すでにアカウントをお持ちの方はこちら <a href="/login">ログイン</a>
            </div>
        </form>
    </div>
</main>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
