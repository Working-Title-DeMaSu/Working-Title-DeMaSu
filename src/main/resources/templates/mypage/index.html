<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ - トイレマップ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="mypage">

<header class="mypage-header">
    <div class="header-inner">
        <a th:href="@{/}" class="logo">
            <i class="fa-solid fa-location-dot"></i>
            <span>トイレマップ</span>
        </a>
        <div class="user-info">
            <div class="user-menu-wrap" onclick="toggleUserMenu()">
                <div class="mypage-user-icon">
                    <img th:if="${user.iconUrl != null}" th:src="${user.iconUrl}" alt="プロフィール">
                    <i th:if="${user.iconUrl == null}" class="fa-solid fa-user"></i>
                </div>
                <span class="user-nickname" th:text="${user.nickname}">ユーザー</span>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div class="mypage-dropdown" id="mypageDropdown">
                <a th:href="@{/mypage}"><i class="fa-solid fa-user"></i> マイページ</a>
                <a th:href="@{/mypage/edit}"><i class="fa-solid fa-pen"></i> プロフィール編集</a>
                <a th:href="@{/mypage/password}"><i class="fa-solid fa-lock"></i> パスワード変更</a>
                <hr>
                <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</a>
            </div>
        </div>
    </div>
</header>

<main class="mypage-main">
    <div class="mypage-container">

        <nav class="mp-breadcrumb">
            <a th:href="@{/}"><i class="fa-solid fa-house"></i> ホーム</a>
            <i class="fa-solid fa-chevron-right"></i>
            <span>マイページ</span>
        </nav>

        <section class="mp-profile-card">
            <div class="mp-profile-avatar">
                <img th:if="${user.iconUrl != null}" th:src="${user.iconUrl}" alt="プロフィール画像">
                <i th:if="${user.iconUrl == null}" class="fa-solid fa-user"></i>
            </div>
            <div class="mp-profile-info">
                <h2 class="mp-profile-nickname" th:text="${user.nickname}">ニックネーム</h2>
                <p class="mp-profile-email" th:text="${user.email}">email@example.com</p>
                <p class="mp-profile-join">
                    <i class="fa-regular fa-calendar"></i>
                    <span th:text="'登録日: ' + ${#temporals.format(user.createdAt, 'yyyy.MM.dd')}">登録日: 2026.01.01</span>
                </p>
            </div>
            <a th:href="@{/mypage/edit}" class="mp-btn-edit">
                <i class="fa-solid fa-pen"></i> プロフィール編集
            </a>
        </section>

        <section class="mp-menu-grid">
            <a th:href="@{/mypage/recent}" class="mp-menu-card">
                <div class="mp-menu-card-icon" style="background:#E8FAF8;color:#2ECDC0;">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </div>
                <div class="mp-menu-card-text">
                    <p class="mp-menu-card-title">最近見たトイレ</p>
                    <p class="mp-menu-card-desc">閲覧履歴を確認する</p>
                </div>
                <i class="fa-solid fa-chevron-right mp-menu-card-arrow"></i>
            </a>
            <a th:href="@{/mypage/reviews}" class="mp-menu-card">
                <div class="mp-menu-card-icon" style="background:#FFF3E0;color:#FF9800;">
                    <i class="fa-solid fa-star"></i>
                </div>
                <div class="mp-menu-card-text">
                    <p class="mp-menu-card-title">投稿したレビュー</p>
                    <p class="mp-menu-card-desc">自分のレビューを管理する</p>
                </div>
                <i class="fa-solid fa-chevron-right mp-menu-card-arrow"></i>
            </a>
            <a th:href="@{/mypage/inquiries}" class="mp-menu-card">
                <div class="mp-menu-card-icon" style="background:#F3E5F5;color:#9C27B0;">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="mp-menu-card-text">
                    <p class="mp-menu-card-title">お問い合わせ履歴</p>
                    <p class="mp-menu-card-desc">問い合わせ内容を確認する</p>
                </div>
                <i class="fa-solid fa-chevron-right mp-menu-card-arrow"></i>
            </a>
            <a th:href="@{/mypage/password}" class="mp-menu-card">
                <div class="mp-menu-card-icon" style="background:#E3F2FD;color:#2196F3;">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="mp-menu-card-text">
                    <p class="mp-menu-card-title">パスワード変更</p>
                    <p class="mp-menu-card-desc">セキュリティを更新する</p>
                </div>
                <i class="fa-solid fa-chevron-right mp-menu-card-arrow"></i>
            </a>
        </section>

        <section class="mp-account-section">
            <h3 class="mp-section-title"><i class="fa-solid fa-circle-info"></i> アカウント情報</h3>
            <div class="mp-account-info-list">
                <div class="mp-account-info-row">
                    <span class="mp-info-label"><i class="fa-solid fa-user"></i> ユーザーID</span>
                    <span class="mp-info-value" th:text="${user.username}">username</span>
                </div>
                <div class="mp-account-info-row">
                    <span class="mp-info-label"><i class="fa-solid fa-phone"></i> 電話番号</span>
                    <span class="mp-info-value" th:text="${user.phone != null ? user.phone : '未登録'}">未登録</span>
                </div>
                <div class="mp-account-info-row">
                    <span class="mp-info-label"><i class="fa-solid fa-venus-mars"></i> 性別</span>
                    <span class="mp-info-value"
                          th:text="${user.gender == 'M' ? '男性' : (user.gender == 'F' ? '女性' : '未登録')}">未登録</span>
                </div>
                <div class="mp-account-info-row">
                    <span class="mp-info-label"><i class="fa-solid fa-cake-candles"></i> 生年月日</span>
                    <span class="mp-info-value"
                          th:text="${user.birthdate != null ? #temporals.format(user.birthdate, 'yyyy.MM.dd') : '未登録'}">未登録</span>
                </div>
            </div>
        </section>

        <div class="mp-logout-area">
            <a th:href="@{/logout}" class="mp-btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i> ログアウト
            </a>
        </div>

    </div>
</main>

<script th:src="@{/js/app.js}"></script>
<script>
    function toggleUserMenu() {
        const dropdown = document.getElementById('mypageDropdown');
        dropdown.classList.toggle('active');
    }
    document.addEventListener('click', function(e) {
        const wrap = document.querySelector('.user-menu-wrap');
        const dropdown = document.getElementById('mypageDropdown');
        if (wrap && !wrap.contains(e.target)) {
            dropdown.classList.remove('active');
        }
    });
</script>
</body>
</html>
