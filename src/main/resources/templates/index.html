<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トイレマップ - 韓国のトイレを探す</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- ========== 전체 컨테이너 ========== -->
<div class="app-container">

    <!-- ========== 지도 영역 (전체 화면) ========== -->
    <div class="map-area" id="mapArea">

        <!-- 지도 -->
        <div id="map" class="map-container"></div>

        <!-- 상단 오버레이: 헤더 + 검색바 + 필터 -->
        <div class="map-overlay-top">

            <!-- 헤더: 로고 + 로그인 -->
            <div class="top-header">
                <div class="logo">
                    <i class="fas fa-restroom"></i>
                    <span>トイレマップ</span>
                </div>
                <div class="header-actions">
                    <!-- 비로그인 시 -->
                    <div sec:authorize="!isAuthenticated()">
                        <button class="btn-login" onclick="openLoginModal()">
                            <i class="fas fa-sign-in-alt"></i> ログイン
                        </button>
                    </div>
                    <!-- 로그인 시 -->
                    <div sec:authorize="isAuthenticated()" class="user-info">
                        <img th:src="${#authentication.principal.iconUrl}" alt="icon" class="user-icon">
                        <span sec:authentication="principal.nickname" class="user-nickname"></span>
                        <button class="btn-icon" onclick="toggleUserMenu()">
                            <i class="fas fa-ellipsis-v"></i>
                        </button>
                        <div class="user-menu" id="userMenu">
                            <a href="/mypage"><i class="fas fa-user"></i> マイページ</a>
                            <a href="/inquiry"><i class="fas fa-envelope"></i> お問い合わせ</a>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit"><i class="fas fa-sign-out-alt"></i> ログアウト</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 검색바 -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="地域、建物名で検索">
            </div>

            <!-- 필터 태그 -->
            <div class="filter-tags">
                <button class="filter-tag active" data-filter="all">すべて</button>
                <button class="filter-tag" data-filter="is24hours">24時間</button>
                <button class="filter-tag" data-filter="isWheelchair">車椅子対応</button>
                <button class="filter-tag" data-filter="hasDiaper">おむつ交換台</button>
                <button class="filter-tag" data-filter="hasPaper">清潔な所</button>
            </div>
        </div>

        <!-- 우측 컨트롤: 줌 + 현재위치 -->
        <div class="map-controls-right">
            <button class="btn-my-location" onclick="moveToMyLocation()">
                <i class="fas fa-crosshairs"></i>
            </button>
        </div>

        <!-- 가장 가까운 화장실 버튼 -->
        <div class="nearest-btn-wrap">
            <button class="btn-nearest" onclick="findNearest()">
                <i class="fas fa-location-arrow"></i> 最も近いトイレ
            </button>
        </div>

    </div>

    <!-- ========== 바텀시트 ========== -->
    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle" id="sheetHandle">
            <div class="handle-bar"></div>
        </div>
        <div class="toilet-list" id="toiletList">
            <div class="toilet-list-empty">
                <i class="fas fa-search"></i>
                <p>周辺のトイレを検索中...</p>
            </div>
        </div>
    </div>

</div>

<!-- ========== 로그인 모달 ========== -->
<div class="modal-overlay" id="loginModal" onclick="closeLoginModal(event)">
    <div class="login-modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeLoginModal()">
            <i class="fas fa-times"></i>
        </button>
        <div class="modal-logo">
            <i class="fas fa-restroom"></i>
            <h2>トイレマップ</h2>
            <p>韓国のトイレを簡単に見つけよう</p>
        </div>
        <form th:action="@{/login}" method="post" class="login-form">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="ユーザーID" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="パスワード" required>
            </div>
            <div class="error-message" id="loginErrorMsg"
                 th:if="${loginError}" style="display:block;">
                <i class="fas fa-exclamation-circle"></i>
                IDまたはパスワードが正しくありません。
            </div>
            <button type="submit" class="btn-submit">ログイン</button>
        </form>
        <div class="divider"><span>または</span></div>
        <button class="btn-google" onclick="googleLogin()">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                <path fill="#34A853" d="M9.003 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9.003 18z"/>
                <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
                <path fill="#EA4335" d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.428 0 9.002 0 5.48 0 2.438 2.017.956 4.958L3.964 7.29c.708-2.127 2.692-3.71 5.036-3.71z"/>
            </svg>
            Googleでログイン
        </button>
        <div class="register-link">
            <span>アカウントをお持ちでないですか？</span>
            <a href="/register">会員登録</a>
        </div>
    </div>
</div>

<!-- 토스트 -->
<div class="toast-notification" id="registerToast" th:if="${registerSuccess}">
    <i class="fas fa-check-circle"></i>
    <span>会員登録が完了しました！ログインしてください。</span>
</div>
<div class="toast-notification" id="logoutToast" th:if="${logoutSuccess}">
    <i class="fas fa-check-circle"></i>
    <span>ログアウトしました。</span>
</div>

<script th:src="@{https://oapi.map.naver.com/openapi/v3/maps.js(ncpKeyId=${naverMapsClientId},language='ja')}"></script>
<script th:src="@{/js/app.js(v=4)}"></script>
<script th:if="${loginError}">
    document.addEventListener('DOMContentLoaded', () => openLoginModal());
</script>
<script th:if="${registerSuccess}">
    document.addEventListener('DOMContentLoaded', () => {
        openLoginModal();
        setTimeout(() => {
            document.getElementById('registerToast')?.classList.add('show');
            setTimeout(() => document.getElementById('registerToast')?.classList.remove('show'), 3000);
        }, 300);
    });
</script>

</body>
</html>
