<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トイレマップ - デマス</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<!-- Header -->
<header class="header">
    <div class="logo" onclick="location.href='/'" style="cursor: pointer;">
        <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
        </div>
        トイレマップ
    </div>
    <div class="header-buttons">
        <!-- トイレを追加ボタン（常時表示） -->
        <a href="/toilet/add" class="add-toilet-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 8v8M8 12h8"></path>
            </svg>
            トイレを追加
        </a>

        <!-- 未ログイン -->
        <div sec:authorize="isAnonymous()" style="display:flex; gap:12px; align-items:center;">
            <button class="login-btn" onclick="openLoginModal()">ログイン</button>
            <a href="/register" class="signup-btn">会員登録</a>
        </div>

        <!-- ログイン済み：ユーザーメニュー -->
        <div sec:authorize="isAuthenticated()" class="user-menu-wrapper" id="userMenuWrapper">
            <button class="user-menu-btn" onclick="toggleUserMenu(event)">
                <div class="user-avatar-small">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <span th:text="${#authentication.principal.nickname != null ? #authentication.principal.nickname : #authentication.principal.username}">ユーザー</span>
                <svg class="chevron-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                    <path d="m6 9 6 6 6-6"></path>
                </svg>
            </button>

            <div class="user-dropdown" id="userDropdown">
                <a href="/mypage/recent" class="dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6v6l4 2"></path>
                    </svg>
                    最近のトイレ
                </a>
                <a href="/toilet/add" class="dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 8v8M8 12h8"></path>
                    </svg>
                    新しいトイレを追加
                </a>
                <a href="/mypage" class="dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    内情報修正
                </a>
                <a href="/inquiry" class="dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <circle cx="12" cy="17" r="1" fill="#00C896" stroke="none"></circle>
                    </svg>
                    お問い合わせ
                </a>
                <div class="dropdown-divider"></div>
                <a href="/logout" class="dropdown-item dropdown-logout">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E53E3E" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    ログアウト
                </a>
            </div>
        </div>
    </div>
</header>

<!-- Main Container -->
<div class="main-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="nearby-section">
            <h2 class="nearby-title">近くのトイレ</h2>
            <p class="nearby-subtitle">現在地から近い順に表示</p>
        </div>

        <!-- Search Box in Sidebar -->
        <div class="sidebar-search">
            <div class="sidebar-search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="地域や建物名で検索">
            </div>
            <div class="sidebar-filters">
                <button class="filter-tag active" data-filter="all">すべて</button>
                <button class="filter-tag" data-filter="is24hours">24時間</button>
                <button class="filter-tag" data-filter="isWheelchair">車椅子対応</button>
                <button class="filter-tag" data-filter="hasDiaper">おむつ交換台</button>
                <button class="filter-tag" data-filter="hasPaper">清潔</button>
            </div>
        </div>

        <!-- Toilet List (Dynamic) -->
        <div class="toilet-list" id="toiletList">
            <div class="toilet-list-empty">
                <i class="fas fa-spinner fa-spin"></i>
                <p>読み込み中...</p>
            </div>
        </div>
    </aside>

    <!-- Map Area -->
    <main class="map-area">
        <div id="map" class="map-container"></div>

        <!-- Right controls -->
        <div class="map-controls-right">
            <button class="btn-my-location" onclick="moveToMyLocation()" title="現在地に移動">
                <i class="fas fa-crosshairs"></i>
            </button>
        </div>

        <!-- Nearest toilet button -->
        <div class="nearest-btn-wrap">
            <button class="btn-nearest" onclick="findNearest()">
                <i class="fas fa-location-arrow"></i> 最も近いトイレ
            </button>
        </div>
    </main>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- Image Lightbox -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox()">
        <i class="fas fa-times"></i>
    </button>
    <img class="lightbox-image" id="lightboxImage" src="" alt="Review image">
</div>

<!-- Login Modal -->
<div id="loginModal" class="login-modal-overlay" style="display: none;">
    <div class="login-modal-content">
        <button class="close-btn" onclick="closeLoginModal()">×</button>

        <div class="modal-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
        </div>

        <h1 class="modal-title">ログイン</h1>
        <p class="modal-subtitle">アカウントにログインしてください</p>

        <form class="login-form" th:action="@{/login}" method="post">
            <div class="form-group">
                <label>メールアドレス</label>
                <input type="email" name="email" placeholder="メールアドレスを入力">
            </div>

            <div class="form-group">
                <label>パスワード</label>
                <input type="password" name="password" placeholder="········">
            </div>

            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember-me">
                    <span>ログイン状態を保持</span>
                </label>
                <a href="#" class="forgot-link">パスワードを忘れた</a>
            </div>

            <button type="submit" class="login-btn-submit">ログイン</button>

            <div class="divider">
                <span>または</span>
            </div>

            <button type="button" class="google-btn" onclick="googleLogin()">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                    <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                    <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707 0-.593.102-1.17.282-1.709V4.958H.957C.347 6.173 0 7.548 0 9c0 1.452.348 2.827.957 4.042l3.007-2.335z"/>
                    <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                Googleでログイン
            </button>

            <p class="signup-link">
                アカウントをお持ちでないですか？ <a href="/register">会員登録</a>
            </p>
        </form>
    </div>
</div>

<!-- Naver Maps API -->
<script type="text/javascript" th:src="'https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=' + ${naverMapsClientId} + '&language=ja'"></script>
<!-- App JS -->
<script th:src="@{/js/app.js(v=5)}"></script>
<script>
    // /login 으로 리다이렉트된 경우 자동으로 로그인 모달 열기
    if (window.location.pathname === '/login') {
        openLoginModal();
    }

    function closeLoginModal() {
        document.getElementById('loginModal').style.display = 'none';
    }

    // 모달 배경 클릭시 닫기
    document.getElementById('loginModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeLoginModal();
        }
    });

    // 유저 드롭다운 토글
    function toggleUserMenu(event) {
        event.stopPropagation();
        const dropdown = document.getElementById('userDropdown');
        const chevron = document.querySelector('.chevron-icon');
        if (!dropdown) return;
        const isOpen = dropdown.classList.contains('open');
        if (isOpen) {
            dropdown.classList.remove('open');
            if (chevron) chevron.style.transform = 'rotate(0deg)';
        } else {
            dropdown.classList.add('open');
            if (chevron) chevron.style.transform = 'rotate(180deg)';
        }
    }

    // 드롭다운 외부 클릭시 닫기
    document.addEventListener('click', function(e) {
        const wrapper = document.getElementById('userMenuWrapper');
        if (wrapper && !wrapper.contains(e.target)) {
            const dropdown = document.getElementById('userDropdown');
            const chevron = document.querySelector('.chevron-icon');
            if (dropdown) dropdown.classList.remove('open');
            if (chevron) chevron.style.transform = 'rotate(0deg)';
        }
    });
</script>
</body>
</html>
