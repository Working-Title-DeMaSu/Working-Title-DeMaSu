<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<body>

<div th:fragment="headerAndToast">

    <!-- トースト通知 -->
    <div class="dms-toast" id="dmsToast"></div>

    <!-- 共通ヘッダー -->
    <header class="header">
        <div class="logo" onclick="location.href='/'" style="cursor: pointer;">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
            </div>
            トイレマップ
        </div>

        <div class="header-buttons">
            <!-- トイレを追加ボタン（常時表示） -->
            <a href="/toilet/add" class="add-toilet-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 8v8M8 12h8"></path>
                </svg>
                トイレを追加
            </a>

            <!-- 未ログイン -->
            <div sec:authorize="isAnonymous()" style="display:flex; gap:12px; align-items:center;">
                <button class="login-btn"
                        onclick="if(window.openLoginModal){openLoginModal();}else{location.href='/login';}">
                    ログイン
                </button>
                <a href="/register" class="signup-btn">会員登録</a>
            </div>

            <!-- ログイン済み：ユーザーメニュー -->
            <div sec:authorize="isAuthenticated()" class="user-menu-wrapper" id="userMenuWrapper">
                <button class="user-menu-btn" onclick="toggleUserMenu(event)">
                    <div class="user-avatar-small">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <span th:text="${#authentication.principal.nickname != null ? #authentication.principal.nickname : #authentication.principal.username}">ユーザー</span>
                    <svg class="chevron-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                        <path d="m6 9 6 6 6-6"></path>
                    </svg>
                </button>

                <div class="user-dropdown" id="userDropdown">
                    <a href="/mypage/recent" class="dropdown-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                        最近のトイレ
                    </a>
                    <a href="/toilet/add" class="dropdown-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 8v8M8 12h8"></path>
                        </svg>
                        新しいトイレを追加
                    </a>
                    <a href="/mypage" class="dropdown-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        マイページ
                    </a>
                    <a href="/inquiry" class="dropdown-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                            <circle cx="12" cy="17" r="1" fill="#00C896" stroke="none"></circle>
                        </svg>
                        お問い合わせ
                    </a>
                    <a href="/admin/dashboard" class="dropdown-item" sec:authorize="hasRole('ADMIN')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        管理者ダッシュボード
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="/logout" class="dropdown-item dropdown-logout">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E53E3E" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        ログアウト
                    </a>
                </div>
            </div>
        </div>
    </header>

</div>

</body>
</html>
